name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            EconomicsReact/package-lock.json
            AvatarSubtitlesReact/package-lock.json

      - name: Build EconomicsReact
        working-directory: EconomicsReact
        run: |
          npm ci
          npm run build -- --base=${PAGES_BASE}/EconomicsReact/

      - name: Build AvatarSubtitlesReact
        working-directory: AvatarSubtitlesReact
        run: |
          npm ci
          npm run build -- --base=${PAGES_BASE}/AvatarSubtitlesReact/

      - name: Generate HRM tests
        run: python3 HRM/gen_tests.py

      - name: Assemble site
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/build-site.mjs

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
