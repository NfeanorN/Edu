name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            EconomicsReact/package-lock.json
            AvatarSubtitlesReact/package-lock.json

      - name: Build EconomicsReact
        working-directory: EconomicsReact
        run: |
          npm ci
          npm run build -- --base=${PAGES_BASE}/EconomicsReact/

      - name: Build AvatarSubtitlesReact
        working-directory: AvatarSubtitlesReact
        run: |
          npm ci
          npm run build -- --base=${PAGES_BASE}/AvatarSubtitlesReact/

      - name: Assemble site
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/build-site.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
