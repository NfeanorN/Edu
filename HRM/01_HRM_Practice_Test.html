      border-radius: 6px;

  .result-opt { cursor: default; }

    .opt-en { font-size: 0.82rem; color: #777; }

      border-radius: 6px;
      font-size: 0.92rem;

    .feedback.bad { background: #fdecea; color: #c0392b; }
    .open-block {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin: 1rem 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

      width: 100%;
      min-height: 120px;
      margin-top: 0.5rem;
      padding: 0.65rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
    }
    .sample {
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: #f8f5fc;
      border-radius: 8px;
      border-left: 3px solid #7b4397;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }

      font-size: 0.85rem;

      padding: 4px 8px;
      text-align: center;
    }
    table.matrix th { background: #7b4397; color: #fff; }

      align-items: center;

      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    button.secondary {
      background: #fff;
      color: #7b4397;
      border: 2px solid #7b4397;
    }
    #results {

      background: #fff;
      border-radius: 12px;

      margin-top: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      border: 2px solid #7b4397;
    }

    .score { font-size: 1.35rem; font-weight: 700; color: #2c3e50; }
    .score-detail { color: #555; margin-top: 0.35rem; }
    .warn { color: #e74c3c; font-weight: 600; margin-top: 0.5rem; }
    mark.correct-mark { background: #d5f5e3; padding: 0 4px; border-radius: 3px; }
    mark.wrong-mark { background: #fadbd8; padding: 0 4px; border-radius: 3px; }
  </style>

ь 1 — Стратегический HRM и подбор персонала"}, {"num": 8, "id": "q8", "en": "Job analysis:", "ru": "Анализ работы (job analysis):", "options": [{"id": "a", "en": "Outlines in detail the specific knowledge, skills, abilities required of the person performing the job", "ru": "Подробно описывает KSA, необходимые для выполнения работы"}, {"id": "b", "en": "None of the other answers is correct", "ru": "Ни один из других ответов не верен"}, {"id": "c", "en": "Is the systematic process of collecting information about all of the parameters of a job", "ru": "Систематический сбор информации обо всех параметрах должности"}, {"id": "d", "en": "Can be performed only via interviews", "ru": "Можно проводить только через интервью"}, {"id": "e", "en": "Is a written statement about the overall tasks, duties and responsibilities of a job", "ru": "Письменное описание задач, обязанностей и ответственности"}], "correct": "c", "section": "Часть 1 — Стратегический HRM и подбор персонала"}, {"num": 9, "id": "q9", "en": "The organization-specific list of activities, their description and how-to are called:", "ru": "Организационный перечень видов деятельности с описанием и инструкциями называется:", "options": [{"id": "a", "en": "Task inventory", "ru": "Task inventory (инвентаризация задач)"}, {"id": "b", "en": "None of the other answers is correct", "ru": "Ни один из других ответов не верен"}, {"id": "c", "en": "Job specification", "ru": "Job specification (спецификация должности)"}, {"id": "d", "en": "Task diary", "ru": "Task diary (дневник задач)"}, {"id": "e", "en": "Job Analysis", "ru": "Job Analysis"}], "correct": "a", "section": "Часть 1 — Стратегический HRM и подбор персонала"}, {"num": 10, "id": "q10", "en": "Job description:", "ru": "Должностная инструкция (job description):", "options": [{"id": "a", "en": "Is a written statement about the overall tasks, duties and responsibilities of a job", "ru": "Письменное описание задач, обязанностей и ответственности должности"}, {"id": "b", "     const OPEN_ITEMS = [{"title_ru": "Открытый вопрос 1", "ru": "Опишите компоненты и характеристики job design и job analysis.", "en": "Describe the components and characteristics of job design and job analysis.", "sample_ru": "Job design (Hackman–Oldham): 1) разнообразие навыков, 2) целостность задачи, 3) значимость задачи, 4) автономия, 5) обратная связь.\n\nJob analysis: название должности, краткое описание, обязанности, KSAO, образование и опыт, физические требования, условия труда, оборудование, связи с другими, стандарты performance."}, {"title_ru": "Открытый вопрос 2", "ru": "Определите кривую заработной платы (wage/salary curve) и опишите её структуру. Какие типы кривых возможны и как их интерпретировать?", "en": "Define the wage/salary curve and describe its structure. Which kinds can you face and how can you interpret them?", "sample_ru": "Wage curve показывает связь относительной ценности должностей и уровня оплаты; строится при job evaluation для справедливой компенсации. Может сравнивать зарплаты компании с рынком. Типы: линейная, ступенчатая, freehand curve при несоответствии рынку."}, {"title_ru": "Открытый вопрос 3", "ru": "Что такое enterprise incentive plan? Приведите примеры (profit sharing, stock options и др.), опишите различия и где они применимы.", "en": "What is an enterprise incentive plan? Provide examples describing their differences and which setting they fit best.", "sample_ru": "Enterprise incentive plans — все сотрудники организации участвуют в выплатах на основе успеха организации (обычно год+). Примеры: profit sharing, stock options, ESOP. Отличаются от индивидуальных/групповых масштабом и горизонтом."}, {"title_ru": "Открытый вопрос 4", "ru": "Вы HR-менеджер растущей малой фирмы. Как внедрить performance appraisal и на каких целях системы сфокусироваться?", "en": "You are the HR manager of a small growing firm. How would you implement performance appraisal and on which goals would you focus?", "sample_ru": "SMART-цели → выбор метода (MBO, рейтинги, 360°) → обучение менеджеров → непрерывная обратная связь → документирование → прозрачность без bias. Цели: развитие, согласование с организацией, обратная связь, справедливость."}, {"title_ru": "Кейс Kendall Toy — вопрос 1", "ru": "Почему повышение зарплаты не улучшило productivity?", "en": "Why did the salary increase not improve productivity?", "sample_ru": "Проблема в дизайне работы (скучная специализация на конвейере), а не в оплате. По Herzberg зарплата — гигиенический фактор, не мотиватор при отсутствии содержания работы."}, {"title_ru": "Кейс Kendall Toy — вопрос 2", "ru": "Какие другие подходы может попробовать Kendall для повышения productivity и commitment?", "en": "What other approaches might Kendall try to improve productivity and worker commitment?", "sample_ru": "Job enrichment/rotation/enlargement, участие сотрудников в улучшениях, команды, обратная связь, пересмотр организации труда."}, {"title_ru": "Кейс Kendall Toy — вопрос 3", "ru": "Что бы вы рекомендовали? Отличаются ли рекомендации для стратегии low cost vs highest quality?", "en": "Which would you recommend? Do recommendations differ for low cost vs highest quality strategy?", "sample_ru": "Обогащение работы + вовлечённость. Low cost — умеренное enrichment + эффективность процессов. Highest quality — сильнее enrichment, обучение, стандарты качества."}];
    const SNA_ITEMS = [];

    const form = document.getElementById('test-form');
    const container = document.getElementById('questions');
    const resultsBox = document.getElementById('results');

    function renderQuestions() {
      container.innerHTML = '';
      let currentSection = '';
      QUESTIONS.forEach((q) => {
        if (q.section && q.section !== currentSection) {
          currentSection = q.section;
          const h = document.createElement('div');
          h.className = 'section-title';
          h.textContent = q.section;
          container.appendChild(h);
        }
        const card = document.createElement('div');
        card.className = 'q';
        card.dataset.id = q.id;
        card.innerHTML = `
          <div class="q-num">Вопрос ${q.num}</div>
          <div class="q-ru">${q.ru}</div>
          <div class="q-en">${q.en}</div>
          <div class="opts">
            ${q.options.map(o => `
              <label class="opt">
                <input type="radio" name="${q.id}" value="${o.id}" />
                <span>
                  <div class="opt-ru"><strong>${o.id.toUpperCase()})</strong> ${o.ru}</div>
                  <div class="opt-en">${o.en}</div>
                </span>
              </label>`).join('')}
          </div>
          <div class="feedback" hidden></div>`;
        container.appendChild(card);
      });
    }

    function renderOpen() {
      if (!OPEN_ITEMS.length) return;
      const h = document.createElement('div');
      h.className = 'section-title';
      h.textContent = 'Открытые вопросы';
      container.appendChild(h);
      OPEN_ITEMS.forEach((item, idx) => {
        const block = document.createElement('div');
        block.className = 'open-block';
        block.innerHTML = `
          <div class="q-num">${item.title_ru}</div>
          <div class="q-ru">${item.ru}</div>
          <div class="q-en">${item.en}</div>
          <textarea name="open_${idx}" placeholder="Ваш ответ..."></textarea>
          <div class="sample" hidden></div>`;
        block.querySelector('.sample').textContent = item.sample_ru;
        container.appendChild(block);
      });
    }

    function renderSna() {
      if (!SNA_ITEMS.length) return;
      const h = document.createElement('div');
      h.className = 'section-title';
      h.textContent = 'SNA — расчёты';
      container.appendChild(h);
      SNA_ITEMS.forEach((item, idx) => {
        const block = document.createElement('div');
        block.className = 'open-block';
        block.innerHTML = `
          <div class="q-ru">${item.ru}</div>
          <div class="q-en">${item.en}</div>
          <input type="text" name="sna_${idx}" style="width:100%;padding:0.65rem;border:1px solid #ddd;border-radius:8px;margin-top:0.5rem;" placeholder="Ваш ответ..." />
          <div class="feedback" hidden></div>`;
        block.dataset.expected = item.expected;
        block.dataset.accept = JSON.stringify(item.accept || []);
        container.appendChild(block);
      });
    }

    function normalize(val) {
      return String(val || '').trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function checkSnaAnswer(expected, accept, user) {
      const n = normalize(user);
      if (!n) return null;
      const variants = [expected, ...(accept || [])].map(normalize);
      return variants.some(v => n === v || n.includes(v) || v.includes(n));
    }

      e.preventDefault();
      let unanswered = 0;
      let correct = 0;
      let wrong = 0;

        const card = container.querySelector(`[data-id="${q.id}"]`);
        const selected = form.querySelector(`input[name="${q.id}"]:checked`);
        card.classList.remove('unanswered', 'correct', 'wrong');
        const fb = card.querySelector('.feedback');
        fb.hidden = true;
        fb.textContent = '';
        card.querySelectorAll('label.opt').forEach((lbl) => {
          lbl.classList.remove('result-opt');
          lbl.style.background = '';
          lbl.querySelector('input').disabled = false;
        });
        if (!selected) {
          unanswered++;
          card.classList.add('unanswered');
        }
      });

      if (unanswered > 0) {
        resultsBox.classList.remove('visible');
        warnEl.hidden = false;
        warnEl.textContent = `Ответьте на все вопросы с вариантами (${unanswered} без ответа).`;
        const first = container.querySelector('.q.unanswered');
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      warnEl.hidden = true;

      QUESTIONS.forEach((q) => {
        const card = container.querySelector(`[data-id="${q.id}"]`);
        const selected = form.querySelector(`input[name="${q.id}"]:checked`);
        const fb = card.querySelector('.feedback');
        fb.hidden = false;
        card.classList.remove('unanswered', 'correct', 'wrong');

        if (!selected) {
          unanswered++;
          card.classList.add('unanswered');
          fb.className = 'feedback bad';
          fb.innerHTML = '⚠️ Ответ не выбран. Правильный: <mark class="correct-mark">' + q.correct.toUpperCase() + '</mark>';
          return;
        }

        const ok = selected.value === q.correct;
        if (ok) {
          correct++;
          card.classList.add('correct');
          fb.className = 'feedback ok';
          fb.textContent = '✓ Верно';
        } else {
          wrong++;
          card.classList.add('wrong');
          fb.className = 'feedback bad';
          fb.innerHTML = '✗ Неверно. Ваш ответ: <mark class="wrong-mark">' + selected.value.toUpperCase() +
            '</mark>. Правильный: <mark class="correct-mark">' + q.correct.toUpperCase() + '</mark>';
        }

        card.querySelectorAll('label.opt').forEach((lbl) => {
          const inp = lbl.querySelector('input');
          lbl.classList.add('result-opt');
          if (inp.value === q.correct) lbl.style.background = '#e8f8ef';
          if (inp.checked && inp.value !== q.correct) lbl.style.background = '#fdecea';
          inp.disabled = true;
        });
      });

      container.querySelectorAll('.open-block .sample').forEach(el => { el.hidden = false; });

      container.querySelectorAll('.open-block .feedback').forEach((fb, i) => {
        const block = fb.closest('.open-block');
        if (!block.dataset.expected) return;
        const inp = block.querySelector('input');
        const ok = checkSnaAnswer(block.dataset.expected, JSON.parse(block.dataset.accept || '[]'), inp.value);
        fb.hidden = false;
        if (ok === null) {
          fb.className = 'feedback bad';
          fb.innerHTML = '⚠️ Пустой ответ. Эталон: <mark class="correct-mark">' + block.dataset.expected + '</mark>';
        } else if (ok) {
          fb.className = 'feedback ok';
          fb.textContent = '✓ Верно';
        } else {
          fb.className = 'feedback bad';
          fb.innerHTML = '✗ Неверно. Эталон: <mark class="correct-mark">' + block.dataset.expected + '</mark>';
        }
      });

      const total = QUESTIONS.length;
      let score = correct * SCORING.correct + wrong * SCORING.wrong;
      if (SCORING.max !== null) score = Math.max(0, Math.min(SCORING.max, score));

      document.getElementById('score-text').textContent =
        `Результат: ${correct} из ${total} (${Math.round(correct/total*100)}%)`;
      document.getElementById('score-detail').textContent =
        SCORING.correct !== 1 || SCORING.wrong !== 0
          ? `Баллы: ${score.toFixed(1)} · Верно: ${correct} · Неверно: ${wrong} · Без ответа: ${unanswered}`
          : `Верно: ${correct} · Неверно: ${wrong} · Без ответа: ${unanswered}`;

      resultsBox.classList.add('visible');
      resultsBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      form.reset();
      resultsBox.classList.remove('visible');
      document.getElementById('warn-text').hidden = true;
      renderQuestions();
      renderOpen();
      renderSna();
      
    });

    renderQuestions();
    renderOpen();
    renderSna();
    
  </script>
</body>
</html>
