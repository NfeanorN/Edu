    <script id="s01e05-embed" type="application/json">{"show":"Avatar: The Last Airbender","season":1,"episode":5,"title":"The King of Omashu","entries":[{"id":1,"text":"Water. Earth. Fire. Air. Long ago, the four nations lived together in harmony."},{"id":2,"text":"Then, everything changed when the Fire Nation attacked."},{"id":3,"text":"Only the Avatar, master of all four elements, could stop them."},{"id":4,"text":"But when the world needed him most, he vanished."},{"id":5,"text":"A hundred years passed, and my brother and I discovered the new Avatar — an airbender named Aang."},{"id":6,"text":"And although his airbending skills are great, he has a lot to learn before he's ready to save anyone."},{"id":7,"text":"But I believe Aang can save the world."},{"id":8,"text":"Book One: Water. Chapter Five: The King of Omashu."},{"id":9,"text":"The Earth Kingdom city of Omashu! I used to always come here to visit my friend, Bumi."},{"id":10,"text":"Wow. We don't have cities like this in the South Pole."},{"id":11,"text":"They have buildings here that don't melt!"},{"id":12,"text":"Well, let's go slow pokes! The real fun is inside the city!"},{"id":13,"text":"Wait, Aang! It could be dangerous if people find out you're the Avatar. You need a disguise."},{"id":14,"text":"So, what am I supposed to do? Grow a mustache?"},{"id":15,"text":"Ohh, so itchy! How do you live in this stuff?"},{"id":16,"text":"Great! Now you look just like my grandfather."},{"id":17,"text":"Technically, Aang is 112 years old."},{"id":18,"text":"Now let's get to skippin', young whippersnappers! The big city awaits."},{"id":19,"text":"You guys are gonna love Omashu. The people here are the friendliest in the world."},{"id":20,"text":"Rotten cabbages! What kind of slum do you think this is?"},{"id":21,"text":"Noo! My cabbages!"},{"id":22,"text":"Just keep smiling."},{"id":23,"text":"State your business!"},{"id":24,"text":"My business is my business, young man, and none of yours!"},{"id":25,"text":"I've got half a mind to bend you over my knee and paddle your backside!"},{"id":26,"text":"Settle down, old timer. Just tell me who you are."},{"id":27,"text":"Name's Bonzu Pipinpadaloxicopolis, the Third, and these are my grandkids."},{"id":28,"text":"Hi, June Pipinpadaloxicopolis. Nice to meet you."},{"id":29,"text":"You seem like a responsible young lady. See that your grandfather stays out of trouble."},{"id":30,"text":"Enjoy Omashu!"},{"id":31,"text":"We will."},{"id":32,"text":"Wait a minute! You're a strong young boy. Show some respect for the elderly and carry your grandfather's bag."},{"id":33,"text":"Good idea!"},{"id":34,"text":"This is the Omashu delivery system. Miles and miles of tubes and chutes."},{"id":35,"text":"Earthbending brings the packages up and gravity brings them down."},{"id":36,"text":"Great, so they get their mail on time."},{"id":37,"text":"They do get their mail on time, but my friend Bumi found a better use for these chutes."},{"id":38,"text":"Look around you, what do you see?"},{"id":39,"text":"Umm the mail system?"},{"id":40,"text":"Instead of seeing what they want you to see, you gotta open your brain to the possibilities."},{"id":41,"text":"A package sending system?"},{"id":42,"text":"The world's greatest super slide!"},{"id":43,"text":"Bumi, you're a mad genius!"},{"id":44,"text":"One ride, then we're off to the North Pole. Airbender's honor."},{"id":45,"text":"This sounded like fun at first, but now that I'm here, I'm starting to have second thoughts!"},{"id":46,"text":"I'm on it!"},{"id":47,"text":"Men, you'll be going off to combat soon. It's important that you be prepared for anything."},{"id":48,"text":"Aang, do something! Use your airbending!"},{"id":49,"text":"Yeh! Good idea! That'll make us go even faster!"},{"id":50,"text":"Sorry!"},{"id":51,"text":"My cabbages! You're gonna pay for this!"},{"id":52,"text":"Two cabbages please."},{"id":53,"text":"Your majesty, these juveniles were arrested for vandalism, traveling under false pretenses and malicious destruction of cabbages."},{"id":54,"text":"Off with their heads! One for each head of cabbage!"},{"id":55,"text":"Silence! Only the King can pass down judgment."},{"id":56,"text":"What is your judgment, Sire?"},{"id":57,"text":"Throw them a feast!"},{"id":58,"text":"Huh?"},{"id":59,"text":"The people in my city have gotten fat from too many feasts, so I hope you like your chicken with no skin."},{"id":60,"text":"Thanks, but I don't eat meat."},{"id":61,"text":"How about you? I bet you like meat."},{"id":62,"text":"Is it just me, or is this guy's crown a little crooked?"},{"id":63,"text":"So, tell me young bald one. Where are you from?"},{"id":64,"text":"I'm from Kangaroo Island."},{"id":65,"text":"Oh, Kangaroo Island, eh? I hear that place is really hoppin'!"},{"id":66,"text":"What? It was pretty funny."},{"id":67,"text":"Well, all these good jokes are making me tired. Guess it's time to hit the hay."},{"id":68,"text":"There's an airbender in our presence — and not just any airbender, the Avatar!"},{"id":69,"text":"Now what do you have to say for yourself, Mr. Pipinpadaloxicopolis?"},{"id":70,"text":"Okay! You caught me. I'm the Avatar, doing my Avatar thing, keeping the world safe."},{"id":71,"text":"Everything checks out, no firebenders here. So, good work everybody."},{"id":72,"text":"Love each other, respect all life and don't run with your spears. We'll see you next time!"},{"id":73,"text":"You can't keep us here. Let us leave."},{"id":74,"text":"Lettuce leaf? We're in serious trouble. This guy is nuts."},{"id":75,"text":"Tomorrow the Avatar will face three deadly challenges."},{"id":76,"text":"But for now, the guards will show you to your chamber."},{"id":77,"text":"My liege, do you mean the good chamber, or the bad chamber?"},{"id":78,"text":"The newly refurbished chamber."},{"id":79,"text":"Wait, which one are we talking about?"},{"id":80,"text":"The one that used to be the bad chamber, until the recent refurbishing that is."},{"id":81,"text":"Of course, we've been calling it the new chamber, but we really should number them."},{"id":82,"text":"Uh, take them to the refurbished chamber that was once bad!"},{"id":83,"text":"This is a prison cell? But it's so nice."},{"id":84,"text":"He did say it was newly refurbished."},{"id":85,"text":"Nice or not, we're prisoners."},{"id":86,"text":"I wonder what these challenges are gonna be."},{"id":87,"text":"We're not sticking around to find out."},{"id":88,"text":"There's gotta be some way outta here."},{"id":89,"text":"The air vents!"},{"id":90,"text":"If you think we're gonna fit through there then you're crazier than that king."},{"id":91,"text":"We can't, but Momo can."},{"id":92,"text":"Momo, I need you to find Appa and bust us outta here!"},{"id":93,"text":"Go on, boy, get Appa!"},{"id":94,"text":"Eh, how was Appa supposed to save us anyway?"},{"id":95,"text":"Appa is a ten ton flying bison, I think he could figure something out."},{"id":96,"text":"Well, no point in arguing about it now. Get some rest, Aang. Looks like you'll need it for tomorrow."},{"id":97,"text":"Sokka! Katara! Where are my friends?"},{"id":98,"text":"The King will free them if you complete your challenges."},{"id":99,"text":"And if I fail?"},{"id":100,"text":"He didn't say."},{"id":101,"text":"Your staff please?"},{"id":102,"text":"First, Avatar, what do you think of my new outfit? I want your honest opinion. I'm waiting."},{"id":103,"text":"I guess it's fine."},{"id":104,"text":"Excellent! You passed the first test."},{"id":105,"text":"Really? Well, not one of the deadly tests. The real challenges are much more challenging."},{"id":106,"text":"I don't have time for your crazy games! Gimme my friends back! We're leaving!"},{"id":107,"text":"Ohh, I thought you might refuse so I will give your friends some special souvenirs."},{"id":108,"text":"Those delightful rings are made of pure genemite, also known as creeping crystal."},{"id":109,"text":"It's crystal that grows remarkably fast. By nightfall your friends will be completely covered in it."},{"id":110,"text":"Terrible fate, really. I can stop it, but only if you cooperate."},{"id":111,"text":"Ah! It's already creeping! I'll do as you want."},{"id":112,"text":"It seems I've lost my lunch box key and I'm hungry."},{"id":113,"text":"Ooo, there it is. Would you mind fetching it for me?"},{"id":114,"text":"Ooo, climbing the ladder. No one's thought of that before."},{"id":115,"text":"That's right. Keep diving head in, I'm sure it'll work eventually."},{"id":116,"text":"There, enjoy your lunch!"},{"id":117,"text":"I want my friends back, now!"},{"id":118,"text":"Uh, not yet. I need help with another matter."},{"id":119,"text":"It seems I've lost my pet Flopsy."},{"id":120,"text":"Okay, found him! Bring him to me!"},{"id":121,"text":"Daddy wants a kiss from Flopsy! Come here, Flopsy!"},{"id":122,"text":"Flopsy, wait! Flopsy! Flopsy!"},{"id":123,"text":"Wait a minute? Flopsy? Flopsy!"},{"id":124,"text":"Awww, that's a good boy! Yes, who has a soft belly?"},{"id":125,"text":"Guys, are you okay?"},{"id":126,"text":"Other than the crystal slowly encasing my entire body, doing great."},{"id":127,"text":"Awww, yes. Come on. I'm ready for the next challenge."},{"id":128,"text":"Your final test is a duel and as a special treat you may choose your opponent."},{"id":129,"text":"Point and choose."},{"id":130,"text":"So, you're saying whoever I point to, that's the person I get to fight?"},{"id":131,"text":"Choose wisely."},{"id":132,"text":"I choose you!"},{"id":133,"text":"Wrong choice! You thought I was a frail old man, but I'm the most powerful earthbender you'll ever see."},{"id":134,"text":"Can I fight the guy with the axe instead?"},{"id":135,"text":"There are no take-backs in my kingdom. You might need this!"},{"id":136,"text":"Typical airbender tactic, avoid and evade. I'd hoped the Avatar would be less predictable."},{"id":137,"text":"Don't you have any surprises for me?"},{"id":138,"text":"Sooner or later, you'll have to strike back."},{"id":139,"text":"Oh, you'll have to be a little more creative than that!"},{"id":140,"text":"Did someone leave the windows open? It feels a little drafty in here!"},{"id":141,"text":"Are you hoping I'll catch a cold?"},{"id":142,"text":"How are you going to get me from way over there?"},{"id":143,"text":"Hehe! Well done, Avatar. You fight with much fire in your heart."},{"id":144,"text":"Huh? You've passed all my tests. Now, you must answer one question."},{"id":145,"text":"That's not fair! You said you would release my friends if I finished your tests."},{"id":146,"text":"Oh, but what's the point of tests if you don't learn anything?"},{"id":147,"text":"Oh come on! Answer this one question and I will set your friends free."},{"id":148,"text":"What is my name?"},{"id":149,"text":"From the looks of your friends, I'd say you only have a few minutes."},{"id":150,"text":"How am I supposed to know his name?"},{"id":151,"text":"Think about the challenges, maybe it's some kind of riddle."},{"id":152,"text":"I got it! He's an earthbender, right? Rocky! You know, because of all the rocks?"},{"id":153,"text":"We're gonna keep trying, but that is a good backup."},{"id":154,"text":"Okay, so back to the challenges. I got a key from the waterfall. I saved his pet and I had a duel."},{"id":155,"text":"And what did you learn?"},{"id":156,"text":"Well, everything was different than I expected. And? Well, they weren't straightforward."},{"id":157,"text":"To solve each test, I had to think differently than I usually would."},{"id":158,"text":"I know his name! I solved the question the same way I solved the challenges."},{"id":159,"text":"As you said a long time ago, I had to open my brain to the possibilities."},{"id":160,"text":"Bumi! You're a mad genius!"},{"id":161,"text":"Oh, Aang. It's good to see you. You haven't changed a bit. Literally."},{"id":162,"text":"Uh, over here! Little help?"},{"id":163,"text":"Genemite is made of rock candy. Delicious!"},{"id":164,"text":"So this crazy king is your old friend, Bumi?"},{"id":165,"text":"Who you calling old? Okay. I'm old."},{"id":166,"text":"Why did you do all this instead of just telling Aang who you were?"},{"id":167,"text":"First of all, it's pretty fun messing with people, hehe, but I do have a reason."},{"id":168,"text":"Aang, you have a difficult task ahead. The world has changed in the hundred years you've been gone."},{"id":169,"text":"It's the duty of the Avatar to restore balance to the world by defeating Fire Lord Ozai."},{"id":170,"text":"You have much to learn. You must master the four elements and confront the Fire Lord."},{"id":171,"text":"And when you do, I hope you will think like a mad genius!"},{"id":172,"text":"And it looks like you're in good hands. You'll need your friends to help defeat the Fire Nation."},{"id":173,"text":"And you'll need Momo too."},{"id":174,"text":"Thank you for your wisdom. But before we leave, I have a challenge for you!"},{"id":175,"text":"My cabbages!"}]}</script>
